# search term (cricket T20/U19 World Cup qualifiers, the Esports World Cup for
# Dota2/LoL/Valorant) and one malformed slug (a broken image-URL artifact in Polymarket's
# own data). 62 events: the outright "World Cup Winner" (negRisk group, one bucket per
# team), award-winner markets (Golden Ball/Boot/Glove etc.), narrower player-prop and
# record-broken markets, and a few entertainment-adjacent ones (halftime show, Trump
# attendance) that are still genuinely World-Cup-themed Polymarket events.
#
# As of this list's creation the tournament is at semifinal/final stage (Spain, England,
# France, Argentina still live in "World Cup Winner"; most other teams already resolved to
# 0/1) — some of these events will finish resolving within days of this file being
# written. A city/event with no more active market is skipped gracefully by
# event_monitor.rs (logged, not a hard error), same as weather's "no event today" case.

