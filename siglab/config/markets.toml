trade_size_usdc = 1.0
reversal = 0.55
reversal_low_threshold = 0.20
reversal_start_time = 120
sl_reversal = 0
unwind_pnl_rev = 0.15
sl_pnl_rev = 0.40
unwind_time_rev = 26.0

