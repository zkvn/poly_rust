# siglab standalone config — Phase 0 (crypto only).
#
# This file is NOT read by, symlinked from, or synced with ../trader/config or
# ../price_feed in any way. Editing it has zero effect on the live bot or the recorder;
# editing trader/config/strategy_*.toml has zero effect on siglab. See siglab/src/config.rs
# and plan_weather_bot.md for why this schema is deliberately its own thing.
#
# Variant params below are a one-time snapshot loosely modeled on
# trader/config/strategy_20260709.toml's live reversal values and
# strategy_20260708.toml's full-history high_prob values — copied by hand, not synced. This
# is intentional (see plan_weather_bot.md §4): a generated-from-bt2/bt3 variant file is a
# later phase, not needed to prove the harness itself works.
#
# CAVEAT: these params were calibrated for 5-minute cycles. Applying them unchanged to the
# 15m markets below is scientifically unvalidated (reversal_start_time/unwind_time are
# absolute-second thresholds, not rescaled for a 900s cycle) — fine for Phase 0's actual
# goal (prove discovery/staleness/scale/output plumbing on real live data), not evidence
# the 15m variants are good strategies. Same caveat class as plan_weather_bot.md §5's
# weather-phase-1 degenerate-strategy note.

# ── Markets: 6 assets x {5m, 15m, 4h} = 18 rotating markets ──
#
# A slot-based "1h" duration does not exist — checked live via
# gamma-api.polymarket.com/events?slug=btc-updown-{1h,60m,1hr,hourly}-{slot} on 2026-07-13,
# all empty. Only 5m/15m/4h use this slot-based slug pattern (confirmed:
# btc-updown-4h-{slot}, slot = (now // 14400) * 14400). There IS a real hourly market
# (polymarket.com/crypto/hourly) — it just uses a completely different slug format
# (ET-calendar-hour + full coin name, not a slot number) — see the `[[hourly_market]]`
# section below, added after being pointed at the live page directly.

[[market]]
asset = "BTC"
suffix = "5m"
period_secs = 300

[[market]]
asset = "BTC"
suffix = "15m"
period_secs = 900

[[market]]
asset = "BTC"
suffix = "4h"
period_secs = 14400

[[market]]
asset = "ETH"
suffix = "5m"
period_secs = 300

[[market]]
asset = "ETH"
suffix = "15m"
period_secs = 900

[[market]]
asset = "ETH"
suffix = "4h"
period_secs = 14400

[[market]]
asset = "SOL"
suffix = "5m"
period_secs = 300

[[market]]
asset = "SOL"
suffix = "15m"
period_secs = 900

[[market]]
asset = "SOL"
suffix = "4h"
period_secs = 14400

[[market]]
asset = "BNB"
suffix = "5m"
period_secs = 300

[[market]]
asset = "BNB"
suffix = "15m"
period_secs = 900

[[market]]
asset = "BNB"
suffix = "4h"
period_secs = 14400

[[market]]
asset = "XRP"
suffix = "5m"
period_secs = 300

[[market]]
asset = "XRP"
suffix = "15m"
period_secs = 900

[[market]]
asset = "XRP"
suffix = "4h"
period_secs = 14400

[[market]]
