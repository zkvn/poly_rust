suffix = "15m"
period_secs = 900

[[market]]
asset = "DOGE"
suffix = "4h"
period_secs = 14400

# ── Hourly markets (polymarket.com/crypto/hourly) — a genuinely different slug format
# (ET-calendar-hour, full coin name) from the slot-based markets above, not the "1h" suffix
# that was checked-and-found-not-to-exist in the note at the top of this file. Found live
# 2026-07-13 (slug e.g. bitcoin-up-or-down-july-13-2026-2am-et) — same simple Up/Down shape
# as 5m/15m/4h once fetched, so these get real reversal/high_prob variants applied, not
# monitoring-only treatment like weather (see siglab/src/weather.rs's doc comment for why
# weather is different: no Binance-equivalent reference feed for it, but these hourly
# markets have exactly the same Binance BTC/ETH/etc. reference as every other duration).

[[hourly_market]]
asset = "BTC"
coin_name = "bitcoin"

[[hourly_market]]
asset = "ETH"
coin_name = "ethereum"

[[hourly_market]]
asset = "SOL"
coin_name = "solana"

[[hourly_market]]
asset = "XRP"
coin_name = "xrp"

[[hourly_market]]
asset = "DOGE"
coin_name = "dogecoin"

[[hourly_market]]
asset = "BNB"
coin_name = "bnb"

# ── Variants: one reversal variant per asset (6), one high_prob variant for BTC/ETH/DOGE (3) ──
# = 9 variants total, ~33 Machine instances across the 18 slot-based markets + 6 hourly-ET
# markets above (each variant now also applies to its asset's new 4h/hourly-et markets —
# applies_to() is asset-scoped, not
# market-scoped, so no variant changes were needed here).

[[variant]]
id = "reversal_btc"
strategy = "reversal"
assets = ["BTC"]
no_enter_when_time_left = 10
max_buy_price = 0.95
spread_premium_limit = 1.05
