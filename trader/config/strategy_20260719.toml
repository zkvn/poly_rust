rowed to exactly the table 1.1 scope). trade_size_usdc is inert for reversal under maker_entry (the GTC quote size is always MIN_GTC_SHARES, not USDC-denominated) — left at its prior value only because AssetParams still requires it. high_prob's own per-asset fields (price_low/price_high/sl_high_prob/unwind_pnl_hp/sl_pnl_hp/unwind_time_hp/delta_pct_hp) are carried over unchanged from strategy_20260717.toml as inert leftovers — AssetParams resolves them regardless of which strategies are active, but [strategies] never selects high_prob in this config, so none of them affect this run."

# Trade assets: all 6 — reversal only, see [strategies].
