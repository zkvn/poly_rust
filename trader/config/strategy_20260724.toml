# Reversal entries now submit an aggressive marketable taker buy instead
# (plan_aggressive_taker_entry_2026-07-21.md §2.1): best_ask + order_slippage
# above, capped at max_buy_price. The maker code path itself is unchanged and
# still reachable (flip this back to true for a future maker-vs-taker
# comparison run) — just off by default here.
