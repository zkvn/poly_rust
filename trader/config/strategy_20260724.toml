source = "Re-pick of delta_pct_rev/reversal/reversal_low_threshold/unwind_pnl_rev/sl_pnl_rev/unwind_time_rev for ETH, BNB, XRP, DOGE only, sourced from ../btc_5mins/studies/reversal_binance's synthetic HAR-Student-t/Binance-only backtest (no real CLOB data in that backtest) — specifically the 5 assets whose best-PnL combo cleared the Deflated Sharpe Ratio's 95% significance bar after deflating for the 2,592-combo trial count (BTC did NOT clear it, p=0.9148, and is explicitly excluded from this repick; SOL is also excluded here even though it cleared DSR, since SOL does not currently trade reversal live — see [strategies] below, unchanged). Per-asset picked values: ETH (delta=0.0003, reversal=0.5, low=0.3, unwind_pnl=0.15, sl_pnl=0.3, unwind_time=15s), BNB (delta=0.0003, reversal=0.5, low=0.4, unwind_pnl=0.10, sl_pnl=0.5, unwind_time=15s), XRP (delta=0.0003, reversal=0.5, low=0.4, unwind_pnl=0.20, sl_pnl=0.4, unwind_time=15s), DOGE (delta=0.0005, reversal=0.5, low=0.4, unwind_pnl=0.10, sl_pnl=0.4, unwind_time=15s). BTC and SOL are carried over verbatim from strategy_20260721_taker.toml, untouched. IMPORTANT CAVEAT carried over from the source study (studies/reversal_binance/summary.md \"Analysis summary\"): the synthetic backtest that produced these values traded against a market literally defined by the same HAR+Student-t probability model as the entry signal, not real CLOB microstructure — the study's own QC toolkit found the apparent edge is substantially mechanical (market-implied null exceeds realized win rate on cycle-end-resolved trades; the winning `reversal` threshold saturates at the grid's minimum on every asset) rather than confirmed evidence of a genuine CLOB-independent timing edge. Deployed anyway per explicit user request as a live paper-trade test, not a validated live-adoption decision. This also flips sl_pnl_rev from disabled (0.0, `unwind_time_rev` was the sole stop under plan 1.2 Scenario A) to a real non-zero stop for these 4 assets specifically -- both unwind_time_rev (now 15s, down from 26-30s) and sl_pnl_rev now act as independent, simultaneously-active exit conditions for ETH/BNB/XRP/DOGE, exactly as swept jointly in the source study's grid. Every other setting (order_slippage, maker_entry=false/taker entry, trade_size_usdc=5.0, sl_reversal=0.1 floor, pup_edge_min_rev=0.0, indicator_enabled, paper_trade=true, market_durations 5m-only, halt/gamma-poll settings, v_shape/high_prob inert blocks, har_beta/har_nu) carried over unchanged from strategy_20260721_taker.toml. Fleet-wide paper balance reset to a fresh $50 start alongside this deploy (all 6 assets' persisted paper_state_*.json archived on Oracle immediately before restart, not just the 4 touched here) -- see live_logs/archive_20260724_fresh50/ on Oracle.\n\nSAME-DAY UPDATE (2026-07-24, by explicit user request): SOL added to the reversal_binance re-pick, per Table 2 in trader/doc/reversal_binance_2026-07-24.md (the same DSR-passing combo table as the initial repick above) -- delta_pct_rev 0.0005->0.0004, reversal 0.70->0.5, reversal_low_threshold 0.20->0.3, unwind_pnl_rev 0.15->0.10, sl_pnl_rev 0.0(disabled)->0.5(enabled), unwind_time_rev 30.0->25.0. Params-only update -- SOL's trade scope ([strategies]/trade_assets) is unchanged. Fleet-wide paper balance reset to a fresh $50 start again alongside this update (all 6 assets' persisted paper_state_*.json re-archived on Oracle immediately before restart, same procedure as the 00:00 deploy above)."

