source = "Switch from maker-entry to aggressive-taker-entry reversal per trader/doc/plan_aggressive_taker_entry_2026-07-21.md, replacing strategy_20260720_24h.toml — that 24h maker-entry window fired 1 trade (DOGE) across all 6 assets, root-caused to the resting-quote fill mechanism itself (requires a trade-through past the bid before it gets pulled at T-15s/signal-invalidation), not to parameters. This file changes exactly two things from strategy_20260720_24h.toml, both mechanism/sizing, zero re-tuning of any reversal per-asset parameter (delta_pct_rev/reversal/reversal_low_threshold/unwind_pnl_rev/unwind_time_rev/sl_pnl_rev/sl_reversal all carried over verbatim): (1) maker_entry = false — reversal entries now submit a marketable taker buy priced at best_ask + order_slippage (capped at max_buy_price), not a resting GTC quote at the bid; order_slippage=0.05 was already present in every strategy_*.toml but never wired into the Rust code until this change (plan §2.1). (2) [trade_size_usdc] default 1.0 -> 5.0 — the taker path is USDC-denominated (shares = size_usdc/fill_price) and the take-profit exit still needs >=MIN_GTC_SHARES=5 shares to rest as a GTC sell; $5.00 comfortably clears 5 shares even at the worst-case entry price (price_high_rev=0.9 cap + aggressive premium up to max_buy_price=0.95, plan §2.2). Take-profit itself is unchanged — already prices off the actual executed fill (worker.rs finalize_entry_fill), not the signal price, for both entry mechanisms; this file doesn't touch that. New: signal-price-vs-executed-price slippage is now logged (entry_signal_price/entry_slippage CSV columns, Telegram 'signal=X -> executed=Y (slippage +/-Z)' line, plan §2.4). Every other setting (pup_edge_min_rev=0.0 fail-closed at PUP_GATE_MAX_AGE_SECS=2.0s, indicator_enabled, paper_trade=true, market_durations 5m-only, halt/gamma-poll settings, v_shape/high_prob inert blocks) carried over unchanged from strategy_20260720_24h.toml.\n\nSAME-DAY UPDATE (2026-07-21, by explicit user request): sl_reversal (absolute stop-loss floor, all reversal assets) raised 0.0 -> 0.1 -- a held position now closes if its own side's price drops below 0.10, independent of unwind_time_rev (still the primary stop, unchanged, not replaced). Every other parameter in this file is untouched by this update."

# Trade assets: all 6 — reversal only, see [strategies].
assets = ["BTC", "ETH", "SOL", "BNB", "XRP", "DOGE"]
trade_assets = ["BTC", "ETH", "SOL", "BNB", "XRP", "DOGE"]

# Max buy price
max_buy_price = 0.95

# FAK order slippage — covers normal 1-tick bid-ask spread without sweeping wide asks.
order_slippage = 0.05

# Retries
stop_loss_max_retries = 5
order_max_retries = 5
cycle_open_close_rest_max_retries = 3
cycle_start_price_retry_interval_s = 2
cycle_start_price_retry_deadline_s = 150

# Timing settings
no_enter_when_time_left = 10
min_cycle_remaining_at_load = 60

# Sanity check
spread_premium_limit = 1.05
spread_discount_limit = 0.95
max_price_age_secs = 2.0

# HAR P(up)/SNR mode
har_pup_enabled = false

# Recording — set false when poly_rust covers the same feed
record_book = false
record_clob = false

# Indicator module (trader/doc/feature_vol_2026-07-18.md) — on for this run:
# poly-indicator.service has live snapshots for pup_edge_min_rev below to gate
# on. Freshness threshold is now PUP_GATE_MAX_AGE_SECS=2.0s (worker.rs), fail
# CLOSED on stale/missing data (trader/doc/plan_stale_data_gate_2026-07-20.md
# §1) — no separate display-only setting exists anymore.
indicator_enabled = true

# Paper-trade mode — real-money trading stays paused for this window too.
paper_trade = true

# Maker entries (plan_unwind_5u_maker_2026-07-19 §2.2) — OFF for this run.
# Reversal entries now submit an aggressive marketable taker buy instead
# (plan_aggressive_taker_entry_2026-07-21.md §2.1): best_ask + order_slippage
# above, capped at max_buy_price. The maker code path itself is unchanged and
# still reachable (flip this back to true for a future maker-vs-taker
# comparison run) — just off by default here.
maker_entry = false

# Trade size — taker entries are USDC-denominated (shares = size_usdc /
# fill_price); $5.00 clears MIN_GTC_SHARES=5 even at the worst-case entry
# price (price_high_rev=0.9 cap + aggressive premium up to max_buy_price=0.95)
# so the take-profit exit can always rest as a GTC sell (plan §2.2). Was 1.0
# under maker_entry, where sizing was fixed at 5 shares directly instead.
[trade_size_usdc]
default = 5.0

# Every asset is 5m only for this run (unchanged scope).
[market_durations]
default = ["5m"]

# Reversal only — high_prob removed for this run.
[strategies]
default = ["reversal"]

# --- Halt --- (unchanged from prior config, not part of this re-pick)
[halt_rev]
default = 1

[halt_prob]
default = 1

# Halt counter reset hour (HKT)
[halt_reset_hour_rev]
default = 2

[halt_reset_hour_hp]
default = 8

