source = "Fresh 24h paper-trade window per trader/doc/plan_stale_data_gate_2026-07-20.md §3, replacing strategy_20260719.toml's 48h window (discarded — see README's 2026-07-20 archival entry). Same mechanism as the prior run (maker_entry=true 5-share GTC reversal entries, p(up) negative-edge gate, indicator_enabled=true, paper_trade=true) — only the reversal exit/entry parameters change here, by explicit user instruction: delta_pct_rev bounded to [0.0003, 0.0008] for every asset (loose enough to fire meaningfully more often than the prior table's 0.0008-0.0010 values, per the prior run's own under-firing problem), the rest of each asset's reversal parameters (reversal/reversal_low_threshold/unwind_pnl_rev/unwind_time_rev) re-picked from the same source study (../btc_5mins/studies/unwind_safely/full_history_sweep.py, calibration window 2026-05-26->07-09) to favor win_rate within that bounded band, not pnl/ppt — user: 'since it's paper trader, I wouldn't worry too much about losing money, I care more about the consistency of results.' Method: re-ran _sweep_reversal (unmodified) for all 6 assets, capturing the FULL per-asset grid (15,444 combos/asset) instead of just the study's persisted top-10 (which is dominated by delta_pct_rev=0.0010, outside the requested band and therefore unusable for this pick), then for each asset: filtered to delta_pct_rev <= 0.0008 and trades >= 20 (the study's own MIN_TRADES qualification bar), took the single highest-win_rate row. Picked rows (delta/reversal/low/unwind_pnl/unwind_time — trades, win_rate, pnl over the full calibration window): BTC 0.0008/0.55/0.20/0.15/30.0 — 168 trades, 85.1% win, pnl 21.60. ETH 0.0008/0.65/0.20/0.15/28.0 — 220 trades, 80.5% win, pnl 19.08. SOL 0.0008/0.70/0.20/0.15/30.0 — 274 trades, 80.3% win, pnl 22.49. BNB 0.0005/0.55/0.20/0.15/30.0 — 300 trades, 80.0% win, pnl 23.78. XRP 0.0008/0.60/0.30/0.15/26.0 — 334 trades, 78.4% win, pnl 25.92. DOGE 0.0008/0.60/0.30/0.15/30.0 — 388 trades, 79.4% win, pnl 26.28. sl_pnl_rev/sl_reversal stay 0.0 for every asset regardless of what the sweep's own best-win_rate row happened to carry for those columns — that's a separate, already-decided policy (plan_unwind_5u_maker_2026-07-19.md §1.2 Scenario A, unwind_time_rev IS the stop; hard condition: if unwind_time_rev is ever disabled/raised, sl_pnl_rev must move to 0.80 the same day), not re-derived here. Every other setting (maker_entry, pup_edge_min_rev=0.0, indicator_enabled, paper_trade, market_durations 5m-only, halt/gamma-poll settings, v_shape/high_prob inert blocks) carried over unchanged from strategy_20260719.toml. Deployed alongside the same-day worker.rs/live.rs changes in trader/doc/plan_stale_data_gate_2026-07-20.md §1-2 (fail-closed p(up) gate, PUP_GATE_MAX_AGE_SECS=2.0s, Telegram/status output fixes) — one restart, not staged separately."

