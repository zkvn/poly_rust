# after entry, regardless of price. 0 = disabled. See
# trader/doc/plan_unwind_time_2026-07-08.md: 30.0 is the walk-forward final
# calibration value for ETH (studies/unwind_safely/results/
# walk_forward_ETH_20260707_232318.md) — flagged there as sitting at the top
# of the tested 10-30s range (same grid-boundary caveat as sl_pnl), shipped
