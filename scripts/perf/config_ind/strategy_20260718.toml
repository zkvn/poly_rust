source = "second same-day update (evening): ETH additionally trades the 15-minute market — [market_durations] ETH = ['5m','15m'], the only non-5m market enabled (no weather, no other 15m assets, no 1h-et, no 4h; see trader/doc/feature_new_markets_2026-07-17.md). Its 'ETH@15m' override keys pin the exact parameters the winning 2026-07-17 local Docker dry-run soak round-trip ran (reversal 0.60 / low 0.20 / delta 0.0006 / unwind_pnl 0.10 / sl_pnl 0.30 / unwind_time 25.0 — the pre-recalibration morning values), independent of the plain ETH keys' 5m calibration below. Everything below this paragraph is the earlier same-day update, unchanged: reversal/high_prob per-asset combos from btc_5mins studies/bt1_overnight_vshape/summary_2026-07-17.md (run_20260717_170052), the 'By PnL (filtered)' leaderboards — deliberately the leaderboards' likely-overfit-flagged picks (win_rate > 90% AND ppt > 0.10 within that report's own filter), NOT the plain best-PnL leaderboard, deployed at the user's explicit request after being shown the sample sizes and warned these are surfaced for scrutiny, not as a recommendation. All 6 assets now trade-enabled (previously BTC/SOL/DOGE only, reversal-only); per-asset strategy set follows which of {reversal, high_prob} had a non-'n/a' filtered pick for that asset in the report — BTC and XRP get both strategies, SOL gets high_prob only, ETH/BNB/DOGE get reversal only (mirrors ETH having no high_prob pick, the precedent named when this deploy was requested). Trade-count caveats, carried over honestly, not resolved by this deploy: these are single-window (12h, 2026-07-16 20:00->2026-07-17 08:00 HKT) picks selected specifically for the overfit pattern — reversal BTC=1 trade, BNB=1 trade, ETH=8, XRP=9, DOGE=13 (92.3% win rate); high_prob SOL=3 trades, XRP=5, BTC=6. None of these are validated edges; several are single-digit-trade samples. sl_reversal (0.10) and sl_high_prob (0.49) are unchanged from the prior live config and were NOT part of this study's sweep — run_study.py fixes both to disabled (ABS_SL=0.0) when generating this leaderboard, so live trading will apply an absolute stop-loss floor never exercised by the trades these parameters were picked from."

# Trade assets: all 6 — see [strategies] for per-asset strategy assignment.
assets = ["BTC", "ETH", "SOL", "BNB", "XRP", "DOGE"]
trade_assets = ["BTC", "ETH", "SOL", "BNB", "XRP", "DOGE"]

# Max buy price
max_buy_price = 0.95

# FAK order slippage — covers normal 1-tick bid-ask spread without sweeping wide asks.
order_slippage = 0.05

# Retries
stop_loss_max_retries = 5
order_max_retries = 5
cycle_open_close_rest_max_retries = 3
cycle_start_price_retry_interval_s = 2
cycle_start_price_retry_deadline_s = 150

# Timing settings
no_enter_when_time_left = 10
min_cycle_remaining_at_load = 60

# Sanity check
spread_premium_limit = 1.05
spread_discount_limit = 0.95
max_price_age_secs = 2.0

# HAR P(up)/SNR mode
har_pup_enabled = false

# Recording — set false when poly_rust covers the same feed
record_book = false
record_clob = false

# Trade size
[trade_size_usdc]
default = 1.0

# Which market durations each trade asset trades (additive, 2026-07-17 evening —
# trader/doc/feature_new_markets_2026-07-17.md §4.1). ETH additionally trades the
# 15-minute market — the ONLY non-5m market enabled (no weather, no other 15m
# assets, no 1h-et, no 4h). Validated the same day by the local Docker dry-run
# soak: full ETH-15m round-trip (entry 0.895 -> timeout exit 0.92, +0.0149) on
# the exact "ETH@15m" params pinned in the reversal tables below; every other
# asset stays 5m-only.
[market_durations]
default = ["5m"]
ETH = ["5m", "15m"]

# Per-asset strategy assignment — see meta.source for how this was derived.
[strategies]
default = ["reversal"]
BTC = ["reversal", "high_prob"]
XRP = ["reversal", "high_prob"]
SOL = ["high_prob"]

